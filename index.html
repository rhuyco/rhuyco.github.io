<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ruai干倒白泥 | 泰娱妈咪必备</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600&family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind Config for Custom Colors/Fonts -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ruai-bg': '#f3f4f6',
                        'ruai-text': '#1f2937',
                        'ruai-accent': '#f472b6',
                        'ruai-soft-blue': '#bfdbfe',
                        'ruai-dark-blue': '#1e3a8a',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans Thai"', 'sans-serif'],
                        serif: ['"Playfair Display"', '"Noto Serif SC"', 'serif'],
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'heartbeat': 'heartbeat 1.5s ease-in-out infinite',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        heartbeat: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.1)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Prevent iOS Bounce */
        body {
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Button Bounce Interaction */
        .btn-bounce:active {
            transform: scale(0.95);
        }
        
        /* Pig Background Pattern */
        .pig-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23f472b6' fill-opacity='0.05' fill-rule='evenodd'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="bg-ruai-bg text-ruai-text font-sans h-screen w-screen overflow-hidden select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- ICONS (Lucide Style SVG Components) ---
        const Icon = ({ path, className = "", size = 24, fill = "none" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const Icons = {
            PigNose: (props) => <Icon {...props} path={<><ellipse cx="12" cy="12" rx="10" ry="6" /><circle cx="8" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="16" cy="12" r="1.5" fill="currentColor" stroke="none"/></>} />,
            Heart: (props) => <Icon {...props} fill={props.filled ? "currentColor" : "none"} path={<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5 4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />} />,
            Menu: (props) => <Icon {...props} path={<><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></>} />,
            X: (props) => <Icon {...props} path={<><path d="M18 6 6 18" /><path d="m6 6 12 12" /></>} />,
            Translate: (props) => <Icon {...props} path={<><path d="m5 8 6 6" /><path d="m4 14 6-6 2-3" /><path d="M2 5h12" /><path d="M7 2h1" /><path d="m22 22-5-10-5 10" /><path d="M14 18h6" /></>} />,
            MessageCircle: (props) => <Icon {...props} path={<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />} />,
            BookOpen: (props) => <Icon {...props} path={<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />} />,
            Calendar: (props) => <Icon {...props} path={<><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><line x1="16" x2="16" y1="2" y2="6" /><line x1="8" x2="8" y1="2" y2="6" /><line x1="3" x2="21" y1="10" y2="10" /></>} />,
            Settings: (props) => <Icon {...props} path={<path d="M12.22 2h-.44a2 2 0 0 1-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.09a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.09a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.72v-.52a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />} />,
            Mic: (props) => <Icon {...props} path={<><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" x2="12" y1="19" y2="22" /></>} />,
            Send: (props) => <Icon {...props} path={<><line x1="22" x2="11" y1="2" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></>} />,
            ChevronLeft: (props) => <Icon {...props} path={<path d="m15 18-6-6 6-6" />} />,
            Volume2: (props) => <Icon {...props} path={<><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></>} />
        };

        // --- HELPER COMPONENTS ---

        const ToastContext = React.createContext();

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);

            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            };

            return (
                <ToastContext.Provider value={addToast}>
                    {children}
                    <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 w-full max-w-xs px-4">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`p-3 rounded-xl shadow-lg text-sm font-medium text-center animate-slide-up glass-panel ${toast.type === 'error' ? 'text-red-500 border-red-200' : 'text-ruai-text border-white'}`}>
                                {toast.message}
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        const useToast = () => React.useContext(ToastContext);

        // --- MAIN APP COMPONENT ---

        const App = () => {
            const [view, setView] = useState('landing');
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [menuOpen, setMenuOpen] = useState(false);

            // Persist API Key
            useEffect(() => {
                if (apiKey) localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            const navigate = (newView) => {
                setView(newView);
                setMenuOpen(false);
            };

            if (view === 'landing') {
                return <LandingPage onEnter={() => navigate('translator')} />;
            }

            return (
                <ToastProvider>
                    <div className="relative w-full h-full bg-ruai-bg pig-pattern overflow-hidden flex flex-col">
                        {/* Header */}
                        <header className="h-16 flex items-center justify-between px-4 z-20 bg-white/60 backdrop-blur-md shadow-sm">
                            <button onClick={() => setMenuOpen(true)} className="p-2 btn-bounce rounded-full hover:bg-white">
                                <Icons.Menu className="text-ruai-text" />
                            </button>
                            <h1 className="font-serif font-bold text-lg tracking-wide text-ruai-dark-blue">
                                {view === 'translator' && '中泰互译'}
                                {view === 'chat' && 'My Idol Chat'}
                                {view === 'learning' && '每日学习'}
                                {view === 'diary' && '追星手账'}
                                {view === 'settings' && '设置'}
                            </h1>
                            <button onClick={() => setView('landing')} className="p-2 btn-bounce rounded-full hover:bg-white text-ruai-accent">
                                <Icons.PigNose />
                            </button>
                        </header>

                        {/* Main Content Area */}
                        <main className="flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth">
                            <div className="min-h-full p-4 pb-20">
                                {view === 'translator' && <Translator apiKey={apiKey} />}
                                {view === 'chat' && <ChatMode />}
                                {view === 'learning' && <LearningMode />}
                                {view === 'diary' && <DiaryMode />}
                                {view === 'settings' && <Settings apiKey={apiKey} setApiKey={setApiKey} />}
                            </div>
                        </main>

                        {/* Sidebar Menu */}
                        {menuOpen && (
                            <div className="absolute inset-0 z-50 flex">
                                <div className="absolute inset-0 bg-black/20 backdrop-blur-sm" onClick={() => setMenuOpen(false)}></div>
                                <div className="relative w-64 bg-white h-full shadow-2xl animate-slide-up flex flex-col">
                                    <div className="p-6 border-b border-gray-100 flex items-center justify-between">
                                        <span className="font-serif font-bold text-xl text-ruai-accent">Ruai</span>
                                        <button onClick={() => setMenuOpen(false)}><Icons.X className="text-gray-400" /></button>
                                    </div>
                                    <nav className="p-4 space-y-2">
                                        <MenuItem icon={<Icons.Translate />} label="翻译神器" onClick={() => navigate('translator')} active={view === 'translator'} />
                                        <MenuItem icon={<Icons.MessageCircle />} label="爱豆聊天" onClick={() => navigate('chat')} active={view === 'chat'} />
                                        <MenuItem icon={<Icons.BookOpen />} label="每日单词" onClick={() => navigate('learning')} active={view === 'learning'} />
                                        <MenuItem icon={<Icons.Calendar />} label="追星日记" onClick={() => navigate('diary')} active={view === 'diary'} />
                                        <div className="h-px bg-gray-100 my-4"></div>
                                        <MenuItem icon={<Icons.Settings />} label="设置 Key" onClick={() => navigate('settings')} active={view === 'settings'} />
                                    </nav>
                                    <div className="mt-auto p-6 text-center text-xs text-gray-400">
                                        Made with 💖 for Thai Fans
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </ToastProvider>
            );
        };

        const MenuItem = ({ icon, label, onClick, active }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center gap-4 p-3 rounded-xl transition-all btn-bounce ${active ? 'bg-ruai-accent text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}`}
            >
                {React.cloneElement(icon, { size: 20 })}
                <span className="font-medium">{label}</span>
            </button>
        );

        // --- SUB-COMPONENTS ---

        const LandingPage = ({ onEnter }) => {
            return (
                <div className="w-full h-full bg-gradient-to-b from-blue-200 to-white flex flex-col items-center justify-center text-center p-6 relative overflow-hidden">
                    {/* Background decorations */}
                    <div className="absolute top-10 left-10 opacity-20 text-white animate-float"><Icons.Heart size={64} filled /></div>
                    <div className="absolute bottom-20 right-10 opacity-20 text-blue-400 animate-float" style={{animationDelay: '1s'}}><Icons.PigNose size={80} /></div>

                    <div className="z-10 animate-fade-in flex flex-col items-center">
                        <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center shadow-xl mb-6 animate-heartbeat text-ruai-accent border-4 border-white">
                            <Icons.PigNose size={64} />
                        </div>
                        <h1 className="font-serif text-4xl font-bold text-ruai-dark-blue mb-2">Ruai</h1>
                        <p className="font-sans text-gray-500 mb-10 tracking-widest text-sm">THAI FANDOM UTILITIES</p>
                        
                        <button 
                            onClick={onEnter}
                            className="bg-ruai-dark-blue text-white px-10 py-4 rounded-full font-bold shadow-lg shadow-blue-200 btn-bounce flex items-center gap-2 group"
                        >
                            <Icons.Heart size={20} filled className="text-ruai-accent group-hover:scale-125 transition-transform" />
                            <span>进入 (Kao Pai)</span>
                        </button>
                    </div>
                </div>
            );
        };

        const Translator = ({ apiKey }) => {
            const [input, setInput] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const showToast = useToast();

            const handleTranslate = async () => {
                if (!input.trim()) return;
                if (!apiKey) {
                    showToast('请先在设置中填写 Gemini API Key', 'error');
                    return;
                }

                setLoading(true);
                try {
                    const prompt = `
                        Translate the following text: "${input}". 
                        If the input is Chinese, translate to Thai. If Thai, translate to Chinese.
                        Return ONLY a valid JSON object with this structure:
                        {
                            "translated": "string",
                            "phonetic": "string (romanization if Thai)",
                            "segments": [
                                {"word": "segment1", "meaning": "meaning1"},
                                {"word": "segment2", "meaning": "meaning2"}
                            ]
                        }
                    `;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    
                    if (data.error) throw new Error(data.error.message);

                    let text = data.candidates[0].content.parts[0].text;
                    // Clean code fences if present
                    text = text.replace(/```json/g, '').replace(/```/g, '').trim();
                    const jsonResult = JSON.parse(text);
                    setResult(jsonResult);

                } catch (error) {
                    console.error(error);
                    showToast('翻译失败，请检查网络或 Key', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const playAudio = (text) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                window.speechSynthesis.speak(utterance);
            };

            return (
                <div className="flex flex-col gap-6">
                    <div className="glass-panel rounded-2xl p-4 shadow-sm">
                        <textarea 
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="输入中文或泰语..."
                            className="w-full bg-transparent outline-none resize-none h-24 text-lg text-gray-700 placeholder-gray-400"
                        />
                        <div className="flex justify-end mt-2">
                            <button 
                                onClick={handleTranslate}
                                disabled={loading}
                                className="bg-ruai-dark-blue text-white px-6 py-2 rounded-full font-bold btn-bounce disabled:opacity-50 flex items-center gap-2"
                            >
                                {loading ? '...' : '翻译 (Plae)'}
                            </button>
                        </div>
                    </div>

                    {result && (
                        <div className="animate-slide-up flex flex-col gap-4">
                            <div className="glass-panel rounded-2xl p-5 border-l-4 border-ruai-accent shadow-md bg-white">
                                <div className="flex justify-between items-start mb-2">
                                    <h2 className="text-2xl font-bold text-gray-800">{result.translated}</h2>
                                    <button onClick={() => playAudio(result.translated)} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200 btn-bounce">
                                        <Icons.Volume2 size={20} className="text-ruai-dark-blue" />
                                    </button>
                                </div>
                                <p className="text-sm text-gray-500 font-mono mb-4 italic">{result.phonetic}</p>
                                
                                <div className="space-y-2">
                                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider">拆解分析</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {result.segments.map((seg, idx) => (
                                            <div key={idx} className="bg-blue-50 px-3 py-1 rounded-lg text-sm flex flex-col">
                                                <span className="font-bold text-blue-800">{seg.word}</span>
                                                <span className="text-xs text-blue-500">{seg.meaning}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChatMode = () => {
            const [messages, setMessages] = useState([
                { id: 1, sender: 'idol', text: 'Sawasdee krub! Kid tueng pom mai? (想我了吗?)', time: '10:00' }
            ]);
            const [input, setInput] = useState('');
            const chatEndRef = useRef(null);
            
            // Fandom phrases (Rainbow Farts)
            const suggestions = [
                { th: "Rak na jub jub", cn: "爱你哟 啾啾" },
                { th: "Lor mak!", cn: "太帅了！" },
                { th: "Su su na", cn: "加油呐" },
                { th: "Narak ah", cn: "可爱死了" }
            ];

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSend = () => {
                if (!input.trim()) return;
                const newMsg = { id: Date.now(), sender: 'me', text: input, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
                setMessages(prev => [...prev, newMsg]);
                setInput('');

                // Mock Reply
                setTimeout(() => {
                    const reply = { id: Date.now() + 1, sender: 'idol', text: '55555 (Hahaha) jai yen yen na krub~', time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
                    setMessages(prev => [...prev, reply]);
                }, 1500);
            };

            const exportChat = () => {
                // Mock export
                alert("已生成长图备忘录 (模拟)");
            };

            return (
                <div className="flex flex-col h-[80vh]">
                    <div className="flex-1 overflow-y-auto space-y-4 px-2 pb-4">
                        {messages.map(msg => (
                            <div key={msg.id} className={`flex ${msg.sender === 'me' ? 'justify-end' : 'justify-start'}`}>
                                {msg.sender === 'idol' && <div className="w-8 h-8 rounded-full bg-gray-300 mr-2 flex-shrink-0 flex items-center justify-center overflow-hidden"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Idol" alt="Idol" /></div>}
                                <div className={`max-w-[75%] p-3 rounded-2xl text-sm ${msg.sender === 'me' ? 'bg-ruai-dark-blue text-white rounded-tr-none' : 'bg-white text-gray-800 shadow-sm rounded-tl-none'}`}>
                                    {msg.text}
                                </div>
                            </div>
                        ))}
                        <div ref={chatEndRef} />
                    </div>

                    {/* Suggestions */}
                    <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide mb-2">
                        {suggestions.map((s, i) => (
                            <button key={i} onClick={() => setInput(s.th)} className="whitespace-nowrap bg-white/80 px-3 py-1 rounded-full text-xs text-ruai-accent border border-pink-100 shadow-sm flex-shrink-0">
                                {s.th} <span className="text-gray-400">({s.cn})</span>
                            </button>
                        ))}
                    </div>

                    {/* Input Area */}
                    <div className="bg-white p-2 rounded-full shadow-lg flex items-center gap-2">
                        <button className="p-2 text-gray-400 hover:text-gray-600"><Icons.Mic size={20}/></button>
                        <input 
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                            placeholder="To P'Idol..."
                            className="flex-1 bg-transparent outline-none text-sm"
                        />
                        <button onClick={handleSend} className="p-2 bg-ruai-accent text-white rounded-full btn-bounce">
                            <Icons.Send size={18} />
                        </button>
                    </div>
                </div>
            );
        };

        const LearningMode = () => {
            const [cards, setCards] = useState([
                { th: "สวัสดี", rom: "Sawasdee", cn: "你好", type: "常用语" },
                { th: "ขอบคุณ", rom: "Khob Khun", cn: "谢谢", type: "常用语" },
                { th: "คิดถึง", rom: "Kid Tueng", cn: "想念", type: "常用语" },
                { th: "น่ารัก", rom: "Narak", cn: "可爱", type: "形容词" },
                { th: "หิว", rom: "Hiew", cn: "饿", type: "动词" }
            ]);
            const [activeIndex, setActiveIndex] = useState(null);

            const toggleCard = (index) => {
                setActiveIndex(activeIndex === index ? null : index);
            };

            const shuffle = () => {
                setCards(prev => [...prev].sort(() => Math.random() - 0.5));
            };

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-lg font-bold text-gray-700">Daily Vocabulary</h2>
                        <button onClick={shuffle} className="text-xs bg-white px-3 py-1 rounded-full border shadow-sm">换一批</button>
                    </div>
                    
                    <div className="grid grid-cols-1 gap-4">
                        {cards.map((card, index) => (
                            <div 
                                key={index} 
                                onClick={() => toggleCard(index)}
                                className={`glass-panel rounded-2xl p-5 transition-all duration-300 ${activeIndex === index ? 'bg-white shadow-lg scale-105' : 'hover:bg-white/50'}`}
                            >
                                <div className="flex justify-between items-center">
                                    <h3 className="text-3xl font-bold text-ruai-dark-blue">{card.th}</h3>
                                    <span className="text-xs bg-gray-200 px-2 py-1 rounded text-gray-500">{card.type}</span>
                                </div>
                                {activeIndex === index && (
                                    <div className="mt-4 pt-4 border-t border-gray-100 animate-fade-in">
                                        <p className="text-lg font-serif text-gray-800">{card.rom}</p>
                                        <p className="text-gray-500 mt-1">{card.cn}</p>
                                        <div className="mt-3 bg-blue-50 p-2 rounded text-xs text-blue-600">
                                            💡 点击发音功能开发中...
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const DiaryMode = () => {
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [entry, setEntry] = useState('');
            const [mood, setMood] = useState('happy');
            const showToast = useToast();

            // Load saved entry
            useEffect(() => {
                const savedData = JSON.parse(localStorage.getItem('ruai_diary') || '{}');
                if (savedData[selectedDate]) {
                    setEntry(savedData[selectedDate].text);
                    setMood(savedData[selectedDate].mood);
                } else {
                    setEntry('');
                    setMood('happy');
                }
            }, [selectedDate]);

            const saveEntry = () => {
                const savedData = JSON.parse(localStorage.getItem('ruai_diary') || '{}');
                savedData[selectedDate] = { text: entry, mood };
                localStorage.setItem('ruai_diary', JSON.stringify(savedData));
                showToast('手账已保存！', 'info');
            };

            const MoodSelector = () => (
                <div className="flex gap-4 my-4 justify-center">
                    {['happy', 'sad', 'excited', 'love'].map(m => (
                        <button 
                            key={m}
                            onClick={() => setMood(m)}
                            className={`text-2xl transition-transform hover:scale-125 ${mood === m ? 'scale-125 drop-shadow-md' : 'opacity-50'}`}
                        >
                            {m === 'happy' && '😊'}
                            {m === 'sad' && '😢'}
                            {m === 'excited' && '😆'}
                            {m === 'love' && '😍'}
                        </button>
                    ))}
                </div>
            );

            return (
                <div className="flex flex-col gap-4">
                    {/* Simple Calendar Strip */}
                    <div className="glass-panel p-4 rounded-2xl overflow-x-auto whitespace-nowrap scrollbar-hide">
                        {Array.from({length: 14}).map((_, i) => {
                            const d = new Date();
                            d.setDate(d.getDate() - 7 + i);
                            const dateStr = d.toISOString().split('T')[0];
                            const isToday = dateStr === new Date().toISOString().split('T')[0];
                            const isSelected = dateStr === selectedDate;
                            
                            return (
                                <button 
                                    key={i} 
                                    onClick={() => setSelectedDate(dateStr)}
                                    className={`inline-flex flex-col items-center justify-center w-12 h-16 mx-1 rounded-xl transition-all ${isSelected ? 'bg-ruai-dark-blue text-white shadow-lg' : 'bg-white text-gray-400'}`}
                                >
                                    <span className="text-xs">{['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]}</span>
                                    <span className="font-bold text-lg">{d.getDate()}</span>
                                    {isToday && <div className="w-1 h-1 bg-ruai-accent rounded-full mt-1"></div>}
                                </button>
                            );
                        })}
                    </div>

                    <div className="glass-panel rounded-2xl p-6 min-h-[300px] flex flex-col relative">
                        <div className="absolute top-4 right-4 text-gray-300"><Icons.PigNose size={100} className="opacity-10"/></div>
                        <h3 className="text-center font-serif text-gray-500 mb-2">{selectedDate}</h3>
                        <MoodSelector />
                        <textarea 
                            className="flex-1 bg-transparent w-full resize-none outline-none font-handwriting leading-relaxed text-gray-700" 
                            placeholder="今天发生了什么开心的事？记录下来吧..."
                            value={entry}
                            onChange={(e) => setEntry(e.target.value)}
                        />
                        <button onClick={saveEntry} className="mt-4 w-full bg-ruai-accent text-white py-3 rounded-xl font-bold btn-bounce shadow-md">
                            保存手账
                        </button>
                    </div>
                </div>
            );
        };

        const Settings = ({ apiKey, setApiKey }) => {
            const [localKey, setLocalKey] = useState(apiKey);
            const showToast = useToast();

            const handleSave = () => {
                setApiKey(localKey);
                showToast('API Key 已保存', 'info');
            };

            return (
                <div className="space-y-6">
                    <div className="glass-panel p-6 rounded-2xl">
                        <h2 className="text-xl font-bold text-ruai-dark-blue mb-4">API 设置</h2>
                        <p className="text-sm text-gray-500 mb-4">
                            本应用需要 Google Gemini API 才能使用翻译功能。Key 仅保存在您的浏览器本地，不会上传到其他服务器。
                        </p>
                        <div className="space-y-2">
                            <label className="text-xs font-bold text-gray-400 uppercase">Gemini API Key</label>
                            <input 
                                type="password" 
                                value={localKey}
                                onChange={(e) => setLocalKey(e.target.value)}
                                className="w-full p-3 rounded-lg bg-gray-50 border border-gray-200 outline-none focus:border-ruai-dark-blue transition-colors"
                                placeholder="AIzaSy..."
                            />
                        </div>
                        <button 
                            onClick={handleSave}
                            className="mt-6 w-full bg-ruai-dark-blue text-white py-3 rounded-xl font-bold btn-bounce shadow-lg"
                        >
                            保存并返回
                        </button>
                    </div>

                    <div className="text-center">
                        <p className="text-xs text-gray-400">Version 1.0.0 (Kawaii Edition)</p>
                        <div className="mt-4 flex justify-center gap-4 text-gray-300">
                             <Icons.Heart size={16} /> <Icons.PigNose size={16} /> <Icons.Heart size={16} />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
